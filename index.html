<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NG26 Team Builder — OpenMinds</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dk-green: #1A2D17;
    --med-green: #4A5E3F;
    --sage: #DAEBC1;
    --sage-light: #EEF5E7;
    --footer-grn: #385723;
    --white: #ffffff;
    --bg: #F3F6F0;
    --border: #D5E4CC;
    --text-1: #1A2D17;
    --text-2: #4A5E3F;
    --text-3: #8FA882;
    --phd-bg: #E8EEF8; --phd: #2E4A8A;
    --mba-bg: #FEF3D6; --mba: #8A5A10;
    --ms-bg: #E6F5EE; --ms: #1A6B40;
    --mpa-bg: #F4E8FF; --mpa: #6B21A8;
    --jd-bg: #FFF0E6;  --jd: #9A3412;
    --p1c: #16A34A; --p2c: #2563EB; --p3c: #EA580C; --pnc: #DC2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--dk-green);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid #2a4524;
  }
  .h-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
  }
  .h-sep { width: 1px; height: 18px; background: #2e4a28; }
  .h-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(218,235,193,0.55);
    letter-spacing: 0.03em;
  }
  .h-right { display: flex; align-items: center; gap: 16px; }
  .h-stat { font-size: 11.5px; color: rgba(218,235,193,0.5); }
  .h-stat strong { color: var(--sage); font-weight: 600; }
  .btn-reset {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--sage);
    background: rgba(218,235,193,0.1);
    border: 1px solid rgba(218,235,193,0.22);
    border-radius: 6px;
    padding: 5px 13px;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-reset:hover { background: rgba(218,235,193,0.18); }
  .ver-switcher {
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(218,235,193,0.18);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .btn-ver {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    padding: 4px 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    color: rgba(218,235,193,0.45);
    background: transparent;
  }
  .btn-ver:hover { color: var(--sage); background: rgba(218,235,193,0.1); }
  .btn-ver.active {
    background: var(--med-green);
    color: var(--sage);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .ver-divider {
    width: 1px; height: 14px;
    background: rgba(218,235,193,0.15);
    flex-shrink: 0;
  }

  /* ─── BOARD ─── */
  .board {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 16px 18px 0;
    display: flex;
    gap: 12px;
    min-width: 0;
  }
  .board::-webkit-scrollbar { height: 6px; }
  .board::-webkit-scrollbar-track { background: transparent; }
  .board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── COLUMN ─── */
  .column {
    flex-shrink: 0;
    width: 214px;
    display: flex;
    flex-direction: column;
    border-radius: 13px 13px 0 0;
    overflow: hidden;
    border: 1.5px solid var(--border);
    border-bottom: none;
    background: var(--white);
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .column.drag-over {
    border-color: var(--med-green);
    box-shadow: 0 0 0 3px rgba(74,94,63,0.15);
  }

  .col-header {
    background: var(--dk-green);
    padding: 11px 13px 9px;
    flex-shrink: 0;
  }
  .col-proj-num {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(218,235,193,0.4);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .col-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    color: var(--sage);
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .col-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .count-wrap { display: flex; align-items: baseline; gap: 3px; }
  .count-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--white);
    line-height: 1;
  }
  .count-lbl { font-size: 10px; color: rgba(218,235,193,0.45); font-weight: 400; }
  .count-badge {
    font-size: 9.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .count-badge.ok  { background: rgba(22,163,74,0.22); color: #86efac; }
  .count-badge.bad { background: rgba(220,38,38,0.22); color: #fca5a5; }

  .col-sub {
    background: var(--sage-light);
    border-bottom: 1px solid var(--border);
    padding: 6px 13px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
  }
  .deg-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .deg-mini { font-size: 9.5px; color: var(--text-2); }
  .deg-mini b { color: var(--text-1); font-weight: 700; }
  .colead-line { font-size: 9.5px; font-weight: 500; }
  .colead-ok  { color: var(--footer-grn); }
  .colead-warn { color: #B91C1C; }

  /* ─── REFERENCE PANEL ─── */
  .ref-panel {
    flex-shrink: 0;
    width: 0;
    overflow: hidden;
    transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
    border-radius: 0 13px 0 0;
    border: 0px solid var(--border);
    border-bottom: none;
    background: var(--white);
  }
  .ref-panel.open {
    width: 186px;
    border-width: 1.5px;
    border-left: none;
  }
  .ref-panel-inner {
    width: 186px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .ref-panel-head {
    background: var(--med-green);
    padding: 9px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .ref-panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--sage); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .ref-panel-close {
    background: none; border: none;
    color: rgba(218,235,193,0.6);
    cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
    transition: color 0.12s;
  }
  .ref-panel-close:hover { color: var(--sage); }
  .ref-note {
    background: var(--sage-light);
    border-bottom: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 9px; color: var(--text-3); font-style: italic;
    flex-shrink: 0;
  }
  .ref-body {
    flex: 1; overflow-y: auto; padding: 8px 7px;
  }
  .ref-body::-webkit-scrollbar { width: 3px; }
  .ref-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .ref-tier-label {
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; display: flex; align-items: center; gap: 5px;
    padding: 7px 3px 4px; margin-top: 2px;
  }
  .ref-tier-label:first-child { padding-top: 2px; }
  .ref-row {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 6px; border-radius: 6px; margin-bottom: 3px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .ref-name {
    font-size: 10.5px; font-weight: 600; color: var(--text-1);
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ref-deg { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }

  .btn-panel-toggle {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px; font-weight: 600; letter-spacing: 0.04em;
    color: rgba(218,235,193,0.55);
    background: none;
    border: 1px solid rgba(218,235,193,0.18);
    border-radius: 4px; padding: 2px 6px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-panel-toggle:hover { color: var(--sage); border-color: rgba(218,235,193,0.35); }
  .btn-panel-toggle.active { color: var(--sage); background: rgba(218,235,193,0.12); border-color: rgba(218,235,193,0.35); }

  /* ─── HOLDING COLUMN ─── */
  .column-hold {
    flex-shrink: 0;
    width: 214px;
    display: flex;
    flex-direction: column;
    border-radius: 13px 13px 0 0;
    overflow: hidden;
    border: 2px dashed #b0c9a5;
    border-bottom: none;
    background: var(--white);
    transition: border-color 0.18s, box-shadow 0.18s;
    opacity: 0.85;
  }
  .column-hold.drag-over {
    border-color: var(--med-green);
    opacity: 1;
    box-shadow: 0 0 0 3px rgba(74,94,63,0.15);
  }
  .col-hold-header {
    background: #e8f0e3;
    padding: 11px 13px 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .col-hold-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 3px;
  }
  .col-hold-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 12.5px; color: var(--text-2); margin-bottom: 6px;
  }
  .col-hold-count {
    font-size: 11px; color: var(--text-3); font-weight: 500;
  }
  .col-hold-count b { color: var(--text-2); }

  /* ─── CARDS AREA ─── */
  .cards {
    flex: 1;
    overflow-y: auto;
    padding: 9px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cards::-webkit-scrollbar { width: 3px; }
  .cards::-webkit-scrollbar-track { background: transparent; }
  .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── CARD ─── */
  .card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: grab;
    user-select: none;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 14px rgba(26,45,23,0.1);
    border-color: #b0c9a5;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.35; transform: scale(0.96); }
  .card.drop-above { position: relative; }
  .card.drop-above::before {
    content: '';
    position: absolute;
    top: -4px; left: 0; right: 0;
    height: 2.5px;
    background: var(--med-green);
    border-radius: 2px;
    z-index: 10;
  }
  .card.drop-below { position: relative; }
  .card.drop-below::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 2.5px;
    background: var(--med-green);
    border-radius: 2px;
    z-index: 10;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 5px;
    gap: 4px;
  }
  .card-name {
    font-weight: 600;
    font-size: 12px;
    color: var(--text-1);
    line-height: 1.3;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pref-badge-card {
    font-size: 8.5px;
    font-weight: 700;
    padding: 1.5px 5px;
    border-radius: 4px;
    background: #E9EFE6;
    color: var(--text-2);
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.01em;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .card-school {
    font-size: 10px;
    color: var(--text-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .card-right { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .deg-pill {
    font-size: 9px;
    font-weight: 700;
    padding: 1.5px 5px;
    border-radius: 4px;
  }
  .deg-pill.PhD  { background: var(--phd-bg); color: var(--phd); }
  .deg-pill.MBA  { background: var(--mba-bg); color: var(--mba); }
  .deg-pill.MS   { background: var(--ms-bg);  color: var(--ms);  }
  .deg-pill.MPA  { background: var(--mpa-bg); color: var(--mpa); }
  .deg-pill.JD   { background: var(--jd-bg);  color: var(--jd);  }
  .crown { font-size: 9.5px; line-height: 1; }

  /* ─── LEGEND ─── */
  .legend {
    background: var(--white);
    border-top: 1.5px solid var(--border);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 22px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .leg-group { display: flex; align-items: center; gap: 10px; }
  .leg-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .leg-items { display: flex; gap: 10px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-2); }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .leg-pill {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  }

  /* ─── MODAL ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,28,12,0.55);
    backdrop-filter: blur(5px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 16px;
    width: 390px;
    max-width: 92vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 70px rgba(15,28,12,0.3);
    animation: mIn 0.2s ease;
  }
  @keyframes mIn {
    from { opacity: 0; transform: scale(0.94) translateY(12px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }
  .modal-head {
    background: var(--dk-green);
    padding: 20px 22px 16px;
    position: relative;
  }
  .modal-num {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    color: rgba(218,235,193,0.4); text-transform: uppercase; margin-bottom: 4px;
  }
  .modal-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 21px;
    color: var(--sage);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .modal-chips { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .modal-chip-deg {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px;
  }
  .modal-chip-deg.PhD { background: rgba(46,74,138,0.18); color: #93b4f0; }
  .modal-chip-deg.MBA { background: rgba(138,90,16,0.18); color: #f5c87a; }
  .modal-chip-deg.MS  { background: rgba(26,107,64,0.18); color: #86efac; }
  .modal-chip-deg.MPA { background: rgba(107,33,168,0.18);color: #d8b4fe; }
  .modal-chip-deg.JD  { background: rgba(154,52,18,0.18); color: #fdba74; }
  .modal-school-tag {
    font-size: 12px; color: rgba(218,235,193,0.6);
  }
  .modal-close-btn {
    position: absolute; top: 16px; right: 16px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(218,235,193,0.1);
    border: 1px solid rgba(218,235,193,0.2);
    color: var(--sage);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background 0.15s;
  }
  .modal-close-btn:hover { background: rgba(218,235,193,0.2); }

  .modal-body { padding: 18px 22px 0; }
  .m-section { margin-bottom: 16px; }
  .m-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.11em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 7px; display: block;
  }
  .pref-list { display: flex; flex-direction: column; gap: 5px; }
  .pref-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 9px; border-radius: 7px; font-size: 12px;
  }
  .pref-row.pr1 { background: rgba(22,163,74,0.07); }
  .pref-row.pr2 { background: rgba(202,138,4,0.07); }
  .pref-row.pr3 { background: rgba(220,107,25,0.07); }
  .pref-badge {
    font-size: 9.5px; font-weight: 700; padding: 1px 5px; border-radius: 4px; flex-shrink: 0;
  }
  .pref-row.pr1 .pref-badge { background: rgba(22,163,74,0.14); color: var(--p1c); }
  .pref-row.pr2 .pref-badge { background: rgba(202,138,4,0.14); color: var(--p2c); }
  .pref-row.pr3 .pref-badge { background: rgba(220,107,25,0.14); color: var(--p3c); }
  .pref-text { color: var(--text-1); line-height: 1.35; }

  .assign-box {
    background: var(--sage-light);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 10px 13px;
  }
  .assign-proj { font-weight: 600; font-size: 13px; color: var(--text-1); margin-bottom: 2px; }
  .assign-match { font-size: 11px; margin-top: 3px; font-weight: 500; }
  .match-1st { color: var(--p1c); }
  .match-2nd { color: var(--p2c); }
  .match-3rd { color: var(--p3c); }
  .match-no  { color: var(--pnc); }

  .tag-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 500; padding: 4px 11px;
    border-radius: 20px; border: 1px solid;
  }
  .tag.yes   { background: rgba(22,163,74,0.07); color: var(--p1c); border-color: rgba(22,163,74,0.2); }
  .tag.no    { background: rgba(220,38,38,0.06); color: #DC2626; border-color: rgba(220,38,38,0.15); }
  .tag.maybe { background: rgba(202,138,4,0.07); color: #CA8A04; border-color: rgba(202,138,4,0.2); }

  .modal-footer {
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
  .btn-linkedin {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; color: #0a66c2; text-decoration: none; font-weight: 500;
    padding: 5px 11px; border-radius: 6px;
    background: rgba(10,102,194,0.06); border: 1px solid rgba(10,102,194,0.15);
    transition: background 0.14s;
  }
  .btn-linkedin:hover { background: rgba(10,102,194,0.12); }
  .btn-close-modal {
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    color: var(--text-2); background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 14px; cursor: pointer; transition: background 0.14s;
  }
  .btn-close-modal:hover { background: var(--border); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="h-left">
    <span class="logo">OpenMinds</span>
    <div class="h-sep"></div>
    <span class="h-title">NG26 · Team Builder</span>
  </div>
  <div class="h-right">
    <span class="h-stat" id="stat-assigned"><strong>32</strong> / 32 assigned</span>
    <span class="h-stat" id="stat-pref1">—</span>
    <div class="ver-switcher">
      <button class="btn-ver" id="btn-v1" onclick="loadVersion(1)">Version 1</button>
      <div class="ver-divider"></div>
      <button class="btn-ver" id="btn-v2" onclick="loadVersion(2)">Version 2</button>
      <div class="ver-divider"></div>
      <button class="btn-ver active" id="btn-v3" onclick="loadVersion(3)">Version 3</button>
    </div>

  { id:30, first:"Aria",           last:"Kovalovich",     school:"Columbia",      degree:"MPA",     prefs:[2,1,4], colead:"Yes",          moderator:"Yes", linkedin:"https://www.linkedin.com/in/ariakov/",                       assigned:4 },
  { id:31, first:"Ka Ying",        last:"Wong",           school:"Columbia",      degree:"MPA",     prefs:[1,2,3], colead:"Yes",          moderator:"Yes", linkedin:"https://www.linkedin.com/in/christy-wong-122204190/",        assigned:1 },
  { id:32, first:"Zara",           last:"Inam",           school:"MIT",           degree:"MBA",     prefs:[1,2,3], colead:"Not sure yet", moderator:"No",  linkedin:"https://www.linkedin.com/in/zarainam/",                      assigned:1 },
];

// Current state: projectId → Array of studentIds (order matters)
let state = {};
let draggingId = null;
let isDragging = false;
let dropTargetId = null;
let dropPosition = null; // 'before' | 'after'
let openPanelId = null;

function degClass(deg) {
  if (deg === 'JD/MBA') return 'JD';
  if (deg.includes('MBA')) return 'MBA';
  if (deg === 'PhD') return 'PhD';
  if (deg === 'MS') return 'MS';
  return 'MPA';
}

function prefBadgeText(studentId, projectId) {
  const s = STUDENTS.find(x => x.id === studentId);
  const idx = s.prefs.indexOf(projectId);
  return idx === 0 ? '1st Pref' : idx === 1 ? '2nd Pref' : idx === 2 ? '3rd Pref' : 'Not in Prefs';
}

function prefLabel(studentId, projectId) {
  const s = STUDENTS.find(x => x.id === studentId);
  const idx = s.prefs.indexOf(projectId);
  return idx === 0 ? '1st choice ✓' : idx === 1 ? '2nd choice' : idx === 2 ? '3rd choice' : 'Not in preferences';
}

function prefMatchClass(idx) {
  return ['match-1st','match-2nd','match-3rd','match-no'][idx] || 'match-no';
}

function initState() {
  state = {};
  state[0] = [];
  PROJECTS.forEach(p => state[p.id] = []);
  const map = VERSION_3;
  STUDENTS.forEach(s => state[map[s.id]].push(s.id));
}

function getColumnStudents(projId) {
  return state[projId].map(id => STUDENTS.find(s => s.id === id));
}

function getCoLeadStatus(projId) {
  const members = getColumnStudents(projId);
  const mbaLeads = members.filter(s => {
    const dc = degClass(s.degree);
    return (dc === 'MBA' || dc === 'JD') && (s.colead === 'Yes' || s.colead === 'Not sure yet');
  });
  if (mbaLeads.length === 0) return { ok: false, text: '⚠ No MBA co-lead identified' };
  const yesLeads = mbaLeads.filter(s => s.colead === 'Yes');
  const name = (yesLeads[0] || mbaLeads[0]).first;
  return { ok: true, text: `✓ MBA co-lead: ${name}${yesLeads.length === 0 ? ' (tentative)' : ''}` };
}

function getDegBreakdown(projId) {
  const members = getColumnStudents(projId);
  const counts = {};
  members.forEach(s => {
    const dc = degClass(s.degree);
    counts[dc] = (counts[dc] || 0) + 1;
  });
  return Object.entries(counts).map(([k,v]) => `<span class="deg-mini"><b>${v}</b> ${k}</span>`).join('');
}

function renderCard(student, projId) {
  const dc = degClass(student.degree);
  const badge = prefBadgeText(student.id, projId);
  const hasCoLead = student.colead === 'Yes';
  const maybeLead = student.colead === 'Not sure yet';
  const starSvg = (op) => `<svg width="10" height="10" viewBox="0 0 24 24" fill="#F59E0B" style="flex-shrink:0;opacity:${op}" title="Co-lead: ${student.colead}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  return `
    <div class="card" draggable="true" data-id="${student.id}"
         onmousedown="handleMouseDown(event)"
         onclick="openModal(${student.id})"
         ondragstart="onDragStart(event, ${student.id})"
         ondragend="onDragEnd(event)"
         ondragover="onCardDragOver(event, ${student.id})"
         ondragleave="onCardDragLeave(event, ${student.id})">
      <div class="card-top">
        <span class="card-name">${student.first} ${student.last}</span>
        <span class="pref-badge-card" title="${prefLabel(student.id, projId)}">${badge}</span>
      </div>
      <div class="card-bottom">
        <span class="card-school">${student.school}</span>
        <div class="card-right">
          ${hasCoLead ? starSvg(1) : maybeLead ? starSvg(0.35) : ''}
          <span class="deg-pill ${dc}">${student.degree}</span>
        </div>
      </div>
    </div>`;
}

function renderBoard() {
  const board = document.getElementById('board');
  const holdMembers = getColumnStudents(0);
  const holdHtml = `
    <div class="column-hold" id="col-0"
         ondragover="onDragOver(event, 0)"
         ondragleave="onDragLeave(event, 0)"
         ondrop="onDrop(event, 0)">
      <div class="col-hold-header">
        <div class="col-hold-label">Holding Area</div>
        <div class="col-hold-title">Unassigned</div>
        <div class="col-hold-count" id="hold-count"><b>${holdMembers.length}</b> cards parked</div>
      </div>
      <div class="cards" id="cards-0">
        ${holdMembers.map(s => renderCard(s, 0)).join('')}
      </div>
    </div>`;

  board.innerHTML = holdHtml + PROJECTS.map(p => {
    const members = getColumnStudents(p.id);
    const count = members.length;
    const countOk = count >= 6 && count <= 7;
    const colead = getCoLeadStatus(p.id);
    return `
      <div class="column" id="col-${p.id}"
           ondragover="onDragOver(event, ${p.id})"
           ondragleave="onDragLeave(event, ${p.id})"
           ondrop="onDrop(event, ${p.id})">
        <div class="col-header">
          <div class="col-proj-num">Project ${p.num}</div>
          <div class="col-title">${p.short}</div>
          <div class="col-footer">
            <div class="count-wrap">
              <span class="count-num" id="cnt-${p.id}">${count}</span>
              <span class="count-lbl">members</span>
            </div>
            <div style="display:flex;align-items:center;gap:5px">
              <span class="count-badge ${countOk ? 'ok' : 'bad'}" id="badge-${p.id}">
                ${countOk ? 'On track' : count < 6 ? 'Under' : 'Over'}
              </span>
              <button class="btn-panel-toggle" id="toggle-btn-${p.id}" onclick="togglePanel(${p.id})">All →</button>
            </div>
          </div>
        </div>
        <div class="col-sub">
          <div class="deg-row" id="degs-${p.id}">${getDegBreakdown(p.id)}</div>
          <div class="colead-line ${colead.ok ? 'colead-ok' : 'colead-warn'}" id="colead-${p.id}">${colead.text}</div>
        </div>
        <div class="cards" id="cards-${p.id}">
          ${members.map(s => renderCard(s, p.id)).join('')}
        </div>
      </div>
      <div class="ref-panel" id="panel-${p.id}"></div>`;
  }).join('');
  updateStats();
}

function updateColumn(projId) {
  if (projId === 0) {
    const members = getColumnStudents(0);
    const el = document.getElementById('hold-count');
    if (el) el.innerHTML = `<b>${members.length}</b> cards parked`;
    const cardsEl = document.getElementById('cards-0');
    if (cardsEl) cardsEl.innerHTML = members.map(s => renderCard(s, 0)).join('');
    updateStats();
    return;
  }
  const members = getColumnStudents(projId);
  const count = members.length;
  const countOk = count >= 6 && count <= 7;
  const colead = getCoLeadStatus(projId);

  document.getElementById(`cnt-${projId}`).textContent = count;
  const badge = document.getElementById(`badge-${projId}`);
  badge.className = `count-badge ${countOk ? 'ok' : 'bad'}`;
  badge.textContent = countOk ? 'On track' : count < 6 ? 'Under' : 'Over';
  document.getElementById(`degs-${projId}`).innerHTML = getDegBreakdown(projId);
  const cl = document.getElementById(`colead-${projId}`);
  cl.className = `colead-line ${colead.ok ? 'colead-ok' : 'colead-warn'}`;
  cl.textContent = colead.text;

  const cardsEl = document.getElementById(`cards-${projId}`);
  cardsEl.innerHTML = members.map(s => renderCard(s, projId)).join('');
  updateStats();
}

function updateStats() {
  let p1=0, p2=0, p3=0, pno=0;
  PROJECTS.forEach(p => {
    getColumnStudents(p.id).forEach(s => {
      const idx = s.prefs.indexOf(p.id);
      if (idx === 0) p1++;
      else if (idx === 1) p2++;
      else if (idx === 2) p3++;
      else pno++;
    });
  });
  document.getElementById('stat-pref1').innerHTML =
    `<strong style="color:var(--sage)">${p1}</strong> 1st · <strong style="color:var(--sage)">${p2}</strong> 2nd · <strong style="color:var(--sage)">${p3}</strong> 3rd${pno > 0 ? ` · <strong style="color:#fca5a5">${pno}</strong> outside prefs` : ''}`;
}

// ─── DRAG & DROP ───
function onDragStart(e, id) {
  isDragging = true;
  draggingId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`.card[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragEnd(e) {
  isDragging = false;
  document.querySelectorAll('.card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.column.drag-over').forEach(el => el.classList.remove('drag-over'));
  clearDropIndicators();
}

function onCardDragOver(e, cardId) {
  e.preventDefault();
  e.stopPropagation();
  if (cardId === draggingId) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pos = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
  if (dropTargetId !== cardId || dropPosition !== pos) {
    clearDropIndicators();
    dropTargetId = cardId;
    dropPosition = pos;
    const el = document.querySelector(`.card[data-id="${cardId}"]`);
    if (el) el.classList.add(pos === 'before' ? 'drop-above' : 'drop-below');
  }
  // also highlight the parent column
  const col = e.currentTarget.closest('.column, .column-hold');
  if (col) col.classList.add('drag-over');
}

function onCardDragLeave(e, cardId) {
  // only clear if leaving to outside the card entirely
  if (!e.currentTarget.contains(e.relatedTarget)) {
    if (dropTargetId === cardId) clearDropIndicators();
  }
}

function clearDropIndicators() {
  document.querySelectorAll('.card.drop-above, .card.drop-below').forEach(el => {
    el.classList.remove('drop-above', 'drop-below');
  });
  dropTargetId = null;
  dropPosition = null;
}

function onDragOver(e, projId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById(`col-${projId}`).classList.add('drag-over');
}

function onDragLeave(e, projId) {
  const col = document.getElementById(`col-${projId}`);
  if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
}

function onDrop(e, projId) {
  e.preventDefault();
  const col = document.getElementById(`col-${projId}`);
  if (col) col.classList.remove('drag-over');
  if (draggingId === null) { clearDropIndicators(); return; }

  const allIds = [0, ...PROJECTS.map(p => p.id)];
  let srcProj = null;
  allIds.forEach(id => { if (state[id] && state[id].includes(draggingId)) srcProj = id; });
  if (srcProj === null) { clearDropIndicators(); return; }

  // Remove from source
  state[srcProj] = state[srcProj].filter(id => id !== draggingId);

  // Insert at position
  if (dropTargetId !== null && state[projId].includes(dropTargetId)) {
    const targetIdx = state[projId].indexOf(dropTargetId);
    const insertIdx = dropPosition === 'before' ? targetIdx : targetIdx + 1;
    state[projId].splice(insertIdx, 0, draggingId);
  } else {
    state[projId].push(draggingId);
  }

  clearDropIndicators();
  updateColumn(srcProj);
  if (srcProj !== projId) updateColumn(projId);
  draggingId = null;
}

function handleMouseDown(e) { isDragging = false; }

// ─── MODAL ───
function openModal(id) {
  if (isDragging) return;
  const s = STUDENTS.find(x => x.id === id);
  let curProjId = null;
  const allIds = [0, ...PROJECTS.map(p => p.id)];
  allIds.forEach(pid => { if (state[pid] && state[pid].includes(id)) curProjId = pid; });
  const curProj = PROJECTS.find(p => p.id === curProjId);
  const prefIdx = curProj ? s.prefs.indexOf(curProjId) : -1;
  const dc = degClass(s.degree);

  const prefRows = s.prefs.map((pid, i) => {
    const proj = PROJECTS.find(p => p.id === pid);
    const rank = ['1st','2nd','3rd'][i];
    return `<div class="pref-row pr${i+1}">
      <span class="pref-badge">P${proj.num} · ${rank}</span>
      <span class="pref-text">${proj.full}</span>
    </div>`;
  }).join('');

  const matchLabel = prefIdx === 0 ? '✓ Assigned to 1st choice' :
                     prefIdx === 1 ? 'Assigned to 2nd choice' :
                     prefIdx === 2 ? 'Assigned to 3rd choice' :
                     '⚠ Not in stated preferences';
  const matchCls = ['match-1st','match-2nd','match-3rd','match-no'][prefIdx] ?? 'match-no';

  const coleadTag = s.colead === 'Yes' ? 'yes' : s.colead === 'No' ? 'no' : 'maybe';

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
      <div class="modal-num">NG26 Participant</div>
      <div class="modal-name">${s.first} ${s.last}</div>
      <div class="modal-chips">
        <span class="modal-chip-deg ${dc}">${s.degree}</span>
        <span class="modal-school-tag">${s.school}</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="m-section">
        <span class="m-label">Current Assignment</span>
        <div class="assign-box">
          <div class="assign-proj">Project ${curProj ? curProj.num + ': ' + curProj.full : 'Holding Area'}</div>
          <div class="assign-match ${matchCls}">${matchLabel}</div>
        </div>
      </div>
      <div class="m-section">
        <span class="m-label">Project Preferences</span>
        <div class="pref-list">${prefRows}</div>
      </div>
      <div class="m-section">
        <span class="m-label">Co-Lead Interest</span>
        <div class="tag-row">
          <span class="tag ${coleadTag}">👑 ${s.colead}</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      ${s.linkedin
        ? `<a href="${s.linkedin}" target="_blank" class="btn-linkedin">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            LinkedIn
          </a>`
        : `<span style="font-size:11px;color:var(--text-3)">No LinkedIn found</span>`}
      <button class="btn-close-modal" onclick="closeModal()">Close</button>
    </div>`;

  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
}

// ─── VERSION MAPS ───
const VERSION_1 = {
  1:2, 2:2, 3:1, 4:2, 5:1, 6:3, 7:1, 8:5, 9:4, 10:5,
  11:3, 12:4, 13:5, 14:2, 15:5, 16:3, 17:3, 18:3, 19:4, 20:4,
  21:5, 22:1, 23:1, 24:3, 25:1, 26:1, 27:4, 28:3, 29:5, 30:4,
  31:2, 32:2
};
const VERSION_2 = {
  1:2, 2:2, 3:2, 4:3, 5:2, 6:1, 7:1, 8:5, 9:5, 10:5,
  11:3, 12:4, 13:5, 14:2, 15:3, 16:4, 17:3, 18:3, 19:4, 20:4,
  21:5, 22:2, 23:1, 24:3, 25:1, 26:1, 27:4, 28:3, 29:5, 30:4,
  31:1, 32:1
};

const VERSION_3 = {
  1:2, 2:2, 3:2, 4:2, 5:2, 6:1, 7:1, 8:5, 9:5, 10:5,
  11:3, 12:4, 13:5, 14:2, 15:3, 16:4, 17:3, 18:3, 19:4, 20:4,
  21:5, 22:1, 23:1, 24:3, 25:1, 26:1, 27:4, 28:3, 29:5, 30:4,
  31:1, 32:2
};

let activeVersion = 3;

function loadVersion(v) {
  activeVersion = v;
  const map = v === 1 ? VERSION_1 : v === 2 ? VERSION_2 : VERSION_3;
  state = {};
  state[0] = [];
  PROJECTS.forEach(p => state[p.id] = []);
  STUDENTS.forEach(s => state[map[s.id]].push(s.id));
  renderBoard();
  document.getElementById('btn-v1').classList.toggle('active', v === 1);
  document.getElementById('btn-v2').classList.toggle('active', v === 2);
  document.getElementById('btn-v3').classList.toggle('active', v === 3);
}

// ─── REFERENCE PANEL ───
function renderPanel(projId) {
  const tiers = [
    { label: '1st Choice', idx: 0, color: 'var(--p1c)' },
    { label: '2nd Choice', idx: 1, color: 'var(--p2c)' },
    { label: '3rd Choice', idx: 2, color: 'var(--p3c)' },
  ];
  const total = STUDENTS.filter(s => s.prefs.includes(projId)).length;
  const sections = tiers.map(tier => {
    const students = STUDENTS.filter(s => s.prefs[tier.idx] === projId);
    if (students.length === 0) return '';
    const rows = students.map(s => {
      const dc = degClass(s.degree);
      const starHtml = s.colead === 'Yes'
        ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="#F59E0B" style="flex-shrink:0" title="Co-lead: Yes"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
        : s.colead === 'Not sure yet'
        ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="#F59E0B" style="flex-shrink:0;opacity:0.35" title="Co-lead: Maybe"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
        : '';
      return `<div class="ref-row">
        <span style="width:5px;height:5px;border-radius:50%;background:${tier.color};flex-shrink:0;display:inline-block"></span>
        <span class="ref-name">${s.first} ${s.last}</span>
        ${starHtml}
        <span class="ref-deg deg-pill ${dc}">${s.degree}</span>
      </div>`;
    }).join('');
    return `<div class="ref-tier-label" style="color:${tier.color}">
      <span>${tier.label}</span>
      <span style="opacity:0.5;font-weight:400">${students.length}</span>
    </div>${rows}`;
  }).join('');

  return `<div class="ref-panel-inner">
    <div class="ref-panel-head">
      <span class="ref-panel-title">All Candidates · ${total}</span>
      <button class="ref-panel-close" onclick="togglePanel(${projId})">✕</button>
    </div>
    <div class="ref-note">Reference only — not draggable</div>
    <div class="ref-body">${sections}</div>
  </div>`;
}

function togglePanel(projId) {
  if (openPanelId === projId) {
    closePanelById(projId);
  } else {
    if (openPanelId !== null) closePanelById(openPanelId);
    openPanelId = projId;
    const panel = document.getElementById(`panel-${projId}`);
    panel.innerHTML = renderPanel(projId);
    panel.classList.add('open');
    const btn = document.getElementById(`toggle-btn-${projId}`);
    if (btn) { btn.textContent = 'Close ✕'; btn.classList.add('active'); }
  }
}

function closePanelById(projId) {
  const panel = document.getElementById(`panel-${projId}`);
  if (panel) panel.classList.remove('open');
  const btn = document.getElementById(`toggle-btn-${projId}`);
  if (btn) { btn.textContent = 'All →'; btn.classList.remove('active'); }
  openPanelId = null;
}

// ─── INIT ───
initState();
renderBoard();
</script>
</body>
</html>
